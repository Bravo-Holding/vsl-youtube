/* ============================================================
   VSL YouTube Live clone — mobile only
   ============================================================ */
:root{
  --yt-red:#FF0000;
  --bg:#fff;
  --txt:#0f0f0f;
  --muted:#606060;
  --line:#e5e5e5;
  --green:#2ba640;
  --green-d:#1f8a33;
  --blue:#1565c0;
  --purple:#8e24aa;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:#000;}
body{
  font-family:"Roboto",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--txt);
  display:flex;flex-direction:column;height:100dvh;overflow:hidden;
}

/* ---------- VIDEO ---------- */
#video-wrap{position:relative;width:100%;background:#000;aspect-ratio:16/9;flex:0 0 auto;}
#player,#player iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
/* bloqueia interação com o player (VSL travado) */
#video-lock{position:absolute;inset:0;z-index:5;background:transparent;}
/* ícones cosméticos canto sup. direito */
#video-badges{position:absolute;top:8px;right:8px;z-index:6;display:flex;gap:10px;align-items:center;pointer-events:none;}
#video-badges .live-dot{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:4px;color:#fff;font-size:11px;font-weight:700;}
#video-badges .live-dot i{width:7px;height:7px;border-radius:50%;background:var(--yt-red);display:inline-block;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#video-badges svg{width:22px;height:22px;filter:drop-shadow(0 0 2px rgba(0,0,0,.6));}

/* overlay tap-to-sound */
#tap-sound{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;cursor:pointer;
  background:rgba(0,0,0,.45);color:#fff;text-align:center;}
#tap-sound .ico{width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;}
#tap-sound .ico svg{width:34px;height:34px;}
#tap-sound p{margin:0;font-size:15px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.8);}
#tap-sound.hide{display:none;}

/* ---------- CHAT ---------- */
#chat{flex:1 1 auto;background:var(--bg);display:flex;flex-direction:column;min-height:0;
  border-top-left-radius:14px;border-top-right-radius:14px;margin-top:-12px;position:relative;z-index:2;}

#chat-head{padding:12px 14px 8px;border-bottom:1px solid var(--line);flex:0 0 auto;}
#chat-head .row1{display:flex;align-items:center;justify-content:space-between;}
#chat-head .row1 .title{font-size:16px;font-weight:600;}
#chat-head .row1 .acts{display:flex;align-items:center;gap:14px;}
#chat-head .xp{background:#f2f2f2;border-radius:20px;padding:3px 9px;font-size:12px;font-weight:600;
  color:var(--purple);display:flex;align-items:center;gap:4px;}
#chat-head .xp svg{width:14px;height:14px;}
#chat-head .acts svg{width:22px;height:22px;color:#0f0f0f;}
#chat-head .row2{display:flex;align-items:center;gap:6px;margin-top:6px;color:var(--muted);font-size:13px;}
#chat-head .row2 .dot{margin:0 2px;}
#chat-head .row2 svg{width:14px;height:14px;}

/* member chips */
#chips{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;flex:0 0 auto;
  border-bottom:1px solid var(--line);scrollbar-width:none;}
#chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;background:var(--green);
  color:#fff;border-radius:20px;padding:5px 12px 5px 5px;font-size:13px;font-weight:600;}
.chip img,.chip .av{width:22px;height:22px;border-radius:50%;object-fit:cover;}

/* messages */
#msgs{flex:1 1 auto;overflow-y:auto;padding:8px 12px 4px;scrollbar-width:none;}
#msgs::-webkit-scrollbar{display:none;}
.msg{display:flex;gap:9px;padding:6px 2px;align-items:flex-start;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg .av{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;overflow:hidden;}
.msg .av img{width:100%;height:100%;object-fit:cover;}
.msg .body{font-size:13.5px;line-height:1.35;color:#0f0f0f;word-break:break-word;}
.msg .body .badge{display:inline-flex;vertical-align:middle;margin-right:4px;}
.msg .body .badge svg{width:14px;height:14px;}
.msg .body .name{font-weight:600;margin-right:6px;font-size:13px;}
.msg .body .name.gray{color:#5f6368;}
.msg .body .name.blue{color:#1565c0;}
.msg .body .name.green{color:#1f8a33;}
.msg .body .name.purple{color:#8e24aa;}
.msg .body .name.orange{color:#e65100;}

/* super chat — card verde de gift memberships */
.superchat{position:relative;margin:8px 2px;border-radius:12px;overflow:hidden;
  background:#1f9d39;background:linear-gradient(135deg,#1faa3c,#178a31);
  box-shadow:0 2px 10px rgba(0,0,0,.18);animation:scin .45s ease;}
@keyframes scin{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.superchat .sc-content{position:relative;z-index:2;padding:11px 90px 13px 12px;}
.superchat .sc-top{display:flex;align-items:center;gap:9px;}
.superchat .sc-top .av{width:28px;height:28px;border-radius:50%;flex:0 0 auto;overflow:hidden;
  display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.25);
  color:#fff;font-weight:700;font-size:12px;}
.superchat .sc-top .av img{width:100%;height:100%;object-fit:cover;}
.superchat .sc-top .nm{font-weight:700;font-size:13.5px;color:#fff;}
.superchat .sc-text{margin-top:7px;font-size:14px;font-weight:600;line-height:1.35;color:#fff;}
.superchat .sc-gift{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:78px;height:78px;z-index:1;opacity:.95;}

/* CTA */
#cta{flex:0 0 auto;padding:10px 12px;border-top:1px solid var(--line);background:#fff;
  display:none;animation:ctain .4s ease;}
#cta.show{display:block;}
@keyframes ctain{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
#cta a{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;
  background:var(--green);color:#fff;font-weight:800;font-size:16px;padding:15px;border-radius:10px;
  box-shadow:0 4px 0 var(--green-d);text-transform:uppercase;letter-spacing:.3px;
  animation:ctapulse 1.6s ease-in-out infinite;}
@keyframes ctapulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
#cta a:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-d);}
#cta .sub{text-align:center;font-size:12px;color:var(--muted);margin-top:7px;}

/* footer subscribers-only */
#footer{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:11px 14px;
  border-top:1px solid var(--line);background:#fff;color:var(--muted);font-size:14px;}
#footer .left{display:flex;align-items:center;gap:9px;flex:1;}
#footer svg{width:20px;height:20px;}

/* ---------- LEAD MODAL (captura antes do checkout) ---------- */
.lead-modal{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;padding:1rem;background:rgba(0,0,0,.74);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);font-family:'Roboto',-apple-system,sans-serif;}
.lead-modal.is-open{display:flex;}
.lead-modal__card{position:relative;width:100%;max-width:25rem;background:#141414;border:1px solid #2A2A2A;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.6);padding:1.9rem 1.6rem 1.5rem;animation:leadPop 200ms ease;}
@keyframes leadPop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.lead-modal__close{position:absolute;top:.6rem;right:.6rem;width:2rem;height:2rem;border:none;background:transparent;color:#6B6B6B;font-size:1.6rem;line-height:1;cursor:pointer;border-radius:50%;transition:all .2s ease;}
.lead-modal__close:hover{background:#1F1F1F;color:#FAFAFA;}
.lead-modal__title{font-weight:800;font-size:1.6rem;line-height:1.1;color:#FAFAFA;margin:0 0 .4rem;}
.lead-modal__sub{font-size:.95rem;color:rgba(250,250,250,.62);margin:0 0 1.25rem;}
.lead-field{margin-bottom:.85rem;}
.lead-field label{display:block;font-size:.8rem;font-weight:600;color:rgba(250,250,250,.62);margin-bottom:.35rem;}
.lead-field input{width:100%;font-size:1rem;padding:.8rem .9rem;border:1.5px solid #2A2A2A;border-radius:10px;background:#0A0A0A;color:#FAFAFA;min-height:52px;transition:border-color .2s ease;box-sizing:border-box;}
.lead-field input::placeholder{color:#6B6B6B;}
.lead-field input:focus{outline:none;border-color:#16A34A;background:#1A1A1A;}
.lead-field input.is-invalid{border-color:#E5484D;}
.lead-phone{display:flex;gap:.5rem;}
.lead-phone__ddi{display:flex;align-items:center;padding:0 .85rem;font-size:1rem;font-weight:600;color:rgba(250,250,250,.62);border:1.5px solid #2A2A2A;border-radius:10px;background:#1A1A1A;white-space:nowrap;}
.lead-phone input{flex:1;}
.lead-modal__submit{width:100%;margin-top:.5rem;display:inline-block;background:#16A34A;color:#fff;font-weight:800;font-size:16px;text-align:center;padding:16px 24px;border:none;border-radius:8px;cursor:pointer;transition:background-color .2s ease;}
.lead-modal__submit:hover:not(:disabled){background:#15803D;}
.lead-modal__submit:disabled{background:#1f3a29;color:#6B6B6B;cursor:not-allowed;}
.lead-modal__hint{margin:.7rem 0 0;font-size:.75rem;color:#6B6B6B;text-align:center;}
</style>

/* ---- util ---- */
const $ = s => document.querySelector(s);
const avColors = ["#e57373","#64b5f6","#81c784","#ba68c8","#ffb74d","#4db6ac","#f06292","#9575cd","#7986cb","#a1887f"];
function initials(name){
  const n = name.replace(/^@/,'').replace(/[._-]/g,' ').trim();
  const parts = n.split(' ').filter(Boolean);
  return ((parts[0]||'?')[0] + (parts[1]?parts[1][0]:'')).toUpperCase();
}
function avFor(name){
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return avColors[h%avColors.length];
}
function memberBadge(){
  return '<span class="badge"><svg viewBox="0 0 24 24" fill="#2ba640"><path d="M12 2l2.4 4.8 5.3.8-3.8 3.7.9 5.3L12 14.9 7.2 16.6l.9-5.3L4.3 7.6l5.3-.8z"/></svg></span>';
}

/* ---- viewers + chips ---- */
$('#viewers').textContent = CONFIG.VIEWERS;
const chipsEl = $('#chips');
CONFIG.CHIPS.forEach(label=>{
  const c=avColors[Math.floor((label.length*7)%avColors.length)];
  const d=document.createElement('div');
  d.className='chip';
  d.innerHTML=`<span class="av" style="background:${c};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;">${label[0]}</span>${label}`;
  chipsEl.appendChild(d);
});

/* ---- chat loop ---- */
const msgsEl = $('#msgs');
let msgIndex = 0;
function appendMessage(m){
  const el = document.createElement('div');
  el.className='msg';
  const col = avFor(m.name);
  const av = m.avatar
    ? `<div class="av"><img src="${m.avatar}" alt="" loading="lazy"></div>`
    : `<div class="av" style="background:${col}">${initials(m.name)}</div>`;
  el.innerHTML =
    av+
    `<div class="body">${m.member?memberBadge():''}<span class="name ${m.color||'gray'}">${m.name}</span>${m.text}</div>`;
  msgsEl.appendChild(el);
  // mantém o DOM enxuto
  while(msgsEl.children.length>60) msgsEl.removeChild(msgsEl.firstChild);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function nextMessage(){
  if(msgIndex>=CONFIG.MESSAGES.length){
    if(!CONFIG.CHAT.loop) return;
    msgIndex=0;
  }
  appendMessage(CONFIG.MESSAGES[msgIndex++]);
  const d=CONFIG.CHAT.minDelay+Math.random()*(CONFIG.CHAT.maxDelay-CONFIG.CHAT.minDelay);
  setTimeout(nextMessage,d);
}
// seed inicial pra não começar vazio
for(let i=0;i<6 && i<CONFIG.MESSAGES.length;i++) appendMessage(CONFIG.MESSAGES[msgIndex++]);
setTimeout(nextMessage,1500);

/* ============================================================
   YouTube IFrame API — player travado + sincronia por tempo
   ============================================================ */
let ytPlayer, syncTimer;
function onYouTubeIframeAPIReady(){
  ytPlayer = new YT.Player('player',{
    videoId: CONFIG.VIDEO_ID,
    playerVars:{
      autoplay:1, mute:1, controls:0, rel:0, modestbranding:1,
      playsinline:1, fs:0, disablekb:1, iv_load_policy:3
    },
    events:{ onReady:onReady }
  });
}
function onReady(e){
  e.target.mute();
  e.target.playVideo();
  syncTimer=setInterval(()=>{
    if(!ytPlayer||!ytPlayer.getCurrentTime) return;
    const t=ytPlayer.getCurrentTime();
    if(t>=CONFIG.SUPERCHAT.time) showSuperchat();
    if(t>=CONFIG.CTA.time) showCTA();
  },300);
}
// tap para ativar som
$('#tap-sound').addEventListener('click',()=>{
  if(ytPlayer&&ytPlayer.unMute){ ytPlayer.unMute(); ytPlayer.setVolume(100); ytPlayer.playVideo(); }
  $('#tap-sound').classList.add('hide');
});

<!-- ORIGEM DAS VENDAS (UTM + sck): reescreve hrefs no load; injeta sck nos links Hotmart/Kiwify -->
<script>
  var currentUrl = window.location.href;
  var url = new URL(currentUrl);
  var pagePath = url.pathname.replace(/^\/|\/$/g, '');
  var cleanReferrer = document.referrer ? document.referrer.replace(/^https?:\/\//, '') : '';
  var utmSource = url.searchParams.get('utm_source') || cleanReferrer || 'Direto';
  var utmMedium = url.searchParams.get('utm_medium') || 'Organico';
  var utmCampaign = url.searchParams.get('utm_campaign') || 'Direto';
  var utmContent = url.searchParams.get('utm_content') || pagePath || 'Home';
  var utmTerm = url.searchParams.get('utm_term') || '';
  var links = document.querySelectorAll('a');
  for (var i = 0; i < links.length; i++) {
    if (!links[i].hasAttribute('popup')) {
      var destinationUrl = links[i].href;
      if (!destinationUrl.includes('#')) {
        var hasUtmParams = destinationUrl.includes('utm_source') ||
          destinationUrl.includes('utm_medium') ||
          destinationUrl.includes('utm_campaign') ||
          destinationUrl.includes('utm_content') ||
          destinationUrl.includes('utm_term');
        if (!hasUtmParams) {
          destinationUrl += (destinationUrl.indexOf('?') === -1 ? '?' : '&');
          destinationUrl += 'utm_source=' + utmSource;
          destinationUrl += '&utm_medium=' + utmMedium;
          destinationUrl += '&utm_campaign=' + utmCampaign;
          destinationUrl += '&utm_content=' + utmContent;
          destinationUrl += '&utm_term=' + utmTerm;
          if (destinationUrl.includes('pay.hotmart') || destinationUrl.includes('pay.kiwify')) {
            var sckValue = (utmContent || utmCampaign || pagePath || 'Home')
              .replace(/[\/_]/g, '-')
              .replace(/-+$/, '')
              .slice(0, 30);
            destinationUrl += '&sck=' + encodeURIComponent(sckValue);
          }
          links[i].href = destinationUrl;
        }
      }
    }
  }
</script>

<!-- MODAL + Pixel Lead + CAPI (Supabase capture-lead). Roda apos UTM/sck pra ler o href ja decorado -->
<script>
  (function () {
    var EDGE_URL = 'https://iodseuinjheacuoptaau.supabase.co/functions/v1/capture-lead';
    var PIXEL_ID = '25723610987317406';
    var VALUE = 397.00, CURRENCY = 'BRL';
    var FALLBACK_CHECKOUT = 'https://pay.hotmart.com/P106391383D?off=2srrhbv4&checkoutMode=10';

    var modal = document.getElementById('lead-modal');
    var form = document.getElementById('lead-form');
    var elName = document.getElementById('lead-name');
    var elEmail = document.getElementById('lead-email');
    var elPhone = document.getElementById('lead-phone');
    var elSubmit = document.getElementById('lead-submit');
    var elClose = document.getElementById('lead-modal-close');
    var checkoutHref = null;
    var submitting = false;

    function getCookie(name) {
      var m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return m ? m.pop() : '';
    }
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }
    function digits(s) { return (s || '').replace(/\D/g, ''); }
    function emailOk(v) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v.trim()); }
    function nameOk(v) { return v.trim().split(/\s+/).filter(Boolean).length >= 2; }
    function phoneOk(v) { var d = digits(v); return d.length >= 10 && d.length <= 11; }

    function validate() {
      var ok = nameOk(elName.value) && emailOk(elEmail.value) && phoneOk(elPhone.value);
      elSubmit.disabled = !ok;
      return ok;
    }
    [elName, elEmail, elPhone].forEach(function (el) {
      el.addEventListener('input', validate);
    });

    function openModal(href) {
      checkoutHref = href;
      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
      setTimeout(function () { elName.focus(); }, 50);
    }
    function closeModal() {
      modal.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a[href*="pay.hotmart"]');
      if (!a) return;
      e.preventDefault();
      openModal(a.href);
    });

    elClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (submitting || !validate()) return;
      submitting = true;
      elSubmit.disabled = true;
      elSubmit.textContent = 'Aguarde...';

      var fullName = elName.value.trim().replace(/\s+/g, ' ');
      var parts = fullName.split(' ');
      var firstName = (parts[0] || '').toLowerCase();
      var lastName = parts.slice(1).join(' ').toLowerCase();
      var email = elEmail.value.trim().toLowerCase();
      var phone = '55' + digits(elPhone.value);

      var eventId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
        : 'lead-' + Date.now() + '-' + Math.floor(Math.random() * 1e6);

      var fbp = getCookie('_fbp');
      var fbc = getCookie('_fbc');
      if (!fbc) {
        var fbclid = getParam('fbclid');
        if (fbclid) fbc = 'fb.1.' + Date.now() + '.' + fbclid;
      }

      if (window.fbq) {
        fbq('init', PIXEL_ID, { em: email, ph: phone, fn: firstName, ln: lastName, external_id: email });
        fbq('track', 'Lead', { value: VALUE, currency: CURRENCY }, { eventID: eventId });
      }

      var payload = {
        product: 'metodo-remiyah',
        value: VALUE, currency: CURRENCY,
        full_name: fullName, first_name: firstName, last_name: lastName,
        email: email, phone: phone,
        utm_source: getParam('utm_source'), utm_medium: getParam('utm_medium'),
        utm_campaign: getParam('utm_campaign'), utm_content: getParam('utm_content'),
        utm_term: getParam('utm_term'),
        sck: (function () { var m = (checkoutHref || '').match(/[?&]sck=([^&]+)/); return m ? decodeURIComponent(m[1]) : ''; })(),
        fbp: fbp, fbc: fbc,
        page_path: window.location.pathname,
        event_id: eventId,
        event_source_url: window.location.href
      };
      try {
        fetch(EDGE_URL, {
          method: 'POST', keepalive: true,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(function () {});
      } catch (err) {}

      var dest = checkoutHref || FALLBACK_CHECKOUT;
      setTimeout(function () { window.location.href = dest; }, 250);
    });
  })();
</script>
